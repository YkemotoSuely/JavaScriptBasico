
<!--Elabore uma página em HTML que demonstre o uso do JavaScript para exibir o texto "Primeira página em JavaScript" em uma tag de cabeçalho de nível 1 (<h1>), formatado com fonte Verdana, cor vermelha e um tamanho de fonte de cabeçalho grande.

    -->
    <!DOCTYPE html>
    <html lang="pt_BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Document</title>
    </head>
    <body>
        <script>
           document.write('<h1 style="font-family: Verdama; color: red;">Primeira página em JavaScript</h1>'); 

           document.write('<h1 style="">Texto</h1>')
        </script> 
    </body>

</html>
