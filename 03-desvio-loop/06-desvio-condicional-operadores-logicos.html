<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional Operadores Logicos</title>
</head>
<body>
    
    
    <h1>Exemplo 06: Desvio Condicional -  (Operadores Lógicos)</h1>

    <!-- Você pode usar operadores lógicos, como "&&" (E) e "||" (OU), para combinar condições em declarações "if" mais complexas. -->
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var aprovado = true;
       var frequencia = 80;


        if (aprovado && frequencia >= 75) {
            document.write("Aprovado por nota e frequência.");
        
        }

    </script>


</body>
</html>
