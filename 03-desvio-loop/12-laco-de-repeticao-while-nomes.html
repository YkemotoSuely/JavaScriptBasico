<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição WHILE - 12-laco-de-repeticao-while-nomes</title>
</head>
<body>

    <h1>Exemplo 12: Laço de repetição (while - nomes)</h1>

         
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>

        var nomes = [];
        var nome;
        var contador = 0;
        
       while (true) {
        nome = prompt("Digite um nome ou 'sair' para encerrar:");
        if (nome === "sair") {
            break;
        }
        nomes.push(nome);
        contador++;
        }
    
        document.write("Você digitou " + contador + " nome(s). ");
        document.write("Nomes informados: ");
        for (var i = 0; i < nomes.length; i++) {
        document.write(nomes[i] + "<br>");
    }

    </script>
    
</body>
</html>
