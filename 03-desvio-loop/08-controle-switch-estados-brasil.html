<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Switch</title>
</head>
<body>
    
    
    <h1>Exemplo 08: Controle Switch (Estados do Brasil)</h1>

    <!-- A estrutura de controle "switch" é usada em JavaScript para realizar testes de múltiplos casos (cases) com base no valor de uma expressão. Ela é especialmente útil quando você precisa tomar decisões com base em várias opções possíveis. O "switch" é frequentemente utilizado para criar declarações de caso (case statements). -->
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>
    <!-- Neste exemplo, a variável `uf` contém a sigla da UF que desejamos consultar, e o "switch" é usado para determinar o nome do estado correspondente. O bloco de código dentro do caso apropriado é executado e, no final, o resultado é exibido na página. -->
    <script>
        
       var uf = "SP";
       var nomeEstado;
       
         switch (uf) {
        case "AC":
            nomeEstado = "Acre";
            break;
        case "AL":
            nomeEstado = "Alagoas";
            break;
        case "AM":
            nomeEstado = "Amazonas";
            break;
        case "AP":
            nomeEstado = "Amapá";
            break;
        case "BA":
            nomeEstado = "Bahia";
            break;
        case "CE":
            nomeEstado = "Ceará";
            break;
        case "DF":
            nomeEstado = "Distrito Federal";
            break;
        case "ES":
            nomeEstado = "Espírito Santo";
            break;
        case "GO":
            nomeEstado = "Goiás";
            break;
        case "MA":
            nomeEstado = "Maranhão";
            break;
        case "MG":
            nomeEstado = "Minas Gerais";
            break;
        case "MS":
            nomeEstado = "Mato Grosso do Sul";
            break;
        case "MT":
            nomeEstado = "Mato Grosso";
            break;
        case "PA":
            nomeEstado = "Pará";
            break;
        case "PB":
            nomeEstado = "Paraíba";
            break;
        case "PE":
            nomeEstado = "Pernambuco";
            break;
        case "PI":
            nomeEstado = "Piauí";
            break;
        case "PR":
            nomeEstado = "Paraná";
            break;
        case "RJ":
            nomeEstado = "Rio de Janeiro";
            break;
        case "RN":
            nomeEstado = "Rio Grande do Norte";
            break;
        case "RO":
            nomeEstado = "Rondônia";
            break;
        case "RR":
            nomeEstado = "Roraima";
            break;
        case "RS":
            nomeEstado = "Rio Grande do Sul";
            break;
        case "SC":
            nomeEstado = "Santa Catarina";
            break;
        case "SE":
            nomeEstado = "Sergipe";
            break;
        case "SP":
            nomeEstado = "São Paulo";
            break;
        case "TO":
            nomeEstado = "Tocantins";
            break;
        default:
            nomeEstado = "UF não encontrada";
    }
    
    document.write("A UF " + uf + " corresponde a " + nomeEstado + ".");

    </script>


</body>
</html>
