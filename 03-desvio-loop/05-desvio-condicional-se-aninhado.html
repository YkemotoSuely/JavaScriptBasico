<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional SE aninhado</title>
</head>
<body>

    <h1>Exemplo 05: Desvio Condicional -  (SE aninhado)</h1>

    <!-- Você pode aninhar várias instruções "if" dentro de outras instruções "if" para lidar com lógica complexa. -->
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var x = 10;
       var y = 5;


        if (x > 5) {
            if(y > 2 ){
                document.write("X é maior que 5 e y é maior que 2.");
            }
  
        }

    </script>


</body>
</html>
