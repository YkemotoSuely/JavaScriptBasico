<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional SE</title>
</head>
<body>

    <h1>Exemplo 01: Desvio Condicional (if)</h1>

    <!-- A "condição" é uma expressão que avalia para verdadeira (true) ou falsa (false). Se a condição for verdadeira, o código dentro do "if" será executado; caso contrário, ele será ignorado. --> 
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var idade = Number(prompt("Digite a sua idade para testar:"));

        if (idade >= 18) {
    document.write("Pode votar! (Idade digitada: " + idade + ")");
} else {
         document.write("Você ainda não pode votar. (Idade digitada: " + idade + ")");
        }

    </script>


</body>
</html>
