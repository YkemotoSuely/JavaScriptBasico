<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional SENÃO SE</title>
</head>
<body>

    <h1>Exemplo 03: Desvio Condicional (else if)</h1>

    <!-- Quando você tem várias condições a serem testadas, você pode usar "else if" para verificar condições adicionais após o "if" inicial. -->
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var pontuação = 75;

        if (pontuação >= 90) {
            document.write("Aprovado com distinção!");
        } else if(pontuação >= 60){
         document.write("Aprovado");
        } else{
            document.write("Reprovado");
        }

    </script>


</body>
</html>
