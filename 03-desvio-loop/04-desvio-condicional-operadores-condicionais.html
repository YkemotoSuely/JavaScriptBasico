<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional Operadores Condicionais</title>
</head>
<body>
    
    
    <h1>Exemplo 04: Desvio Condicional -  (Operadores Condicionais)</h1>

    <!-- Operadores condicionais, como "==", "!=", ">", "<", ">=" e "<=", são usados para comparar valores e criar condições em declarações "if". -->
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var x = 10;
       var y = 5;


        if (x>y) {
            document.write("X é maior que y.");
        
        }

    </script>


</body>
</html>
