<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição FOR (Tabuada)</title>
</head>
<body>

    <h1>Exemplo 09: Laço de repetição (for - Tabuada)</h1>

    <!-- O laço de repetição "for" é uma estrutura de controle essencial em JavaScript para a realização de tarefas repetitivas. Neste exemplo, usaremos um laço "for" para calcular a tabuada de um número escolhido e exibi-la diretamente na página HTML..--> 
     
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>

        var numero = 8; 
        var resultado = "";
        
       for(var i = 1; i < 10; i++){
        resultado += numero + " X " + i + " = " + (numero * i) + "<br>"
       
       }
        document.write(resultado);

    </script>


</body>
</html>
