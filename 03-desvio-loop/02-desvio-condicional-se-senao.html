<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvio condicional SENÃO</title>
</head>
<body>

    <h1>Exemplo 02: Desvio Condicional (else)</h1>

    <!-- Você pode adicionar uma cláusula "else" após um bloco "if" para especificar um código a ser executado quando a condição for falsa. -->
    <p>O resultado do JavaScript aparecerá logo abaixo:</p>
    <hr>

    <script>
        
       var idade = 16;

        if (idade >= 18) {
            document.write("Pode votar!");
        } else {
         document.write("Você ainda não pode votar. ");
        }

    </script>


</body>
</html>
